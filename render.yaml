services:
  - type: web
    name: agenda-entregas
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SUPPLIER_SOAP_USER
        value: agendador
      - key: SUPPLIER_SOAP_PASS
        value: agendador
      - key: PYTHON_VERSION
        value: 3.11.0
